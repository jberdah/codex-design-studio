<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200" role="img" aria-labelledby="title description">
  <title id="title">Codex Design Studio</title>
  <desc id="description">Codex Design Studio logo and name. Create, build, and edit your design assets and system with AI.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17151f"/>
      <stop offset="1" stop-color="#332b42"/>
    </linearGradient>
    <radialGradient id="violetGlow" cx="0" cy="0" r="1" gradientTransform="translate(1590 250) rotate(132) scale(1010)">
      <stop stop-color="#8b79aa" stop-opacity=".26"/>
      <stop offset="1" stop-color="#8b79aa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="iconSurface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f293b"/>
      <stop offset="1" stop-color="#15131c"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d8d0ec"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="30" stdDeviation="38" flood-color="#09070d" flood-opacity=".46"/>
    </filter>
  </defs>

  <rect width="1800" height="1200" fill="url(#background)"/>
  <rect width="1800" height="1200" fill="url(#violetGlow)"/>
  <g opacity=".09" stroke="#ffffff" stroke-width="1">
    <path d="M0 180H1800M0 420H1800M0 660H1800M0 900H1800M0 1140H1800"/>
    <path d="M180 0V1200M420 0V1200M660 0V1200M900 0V1200M1140 0V1200M1380 0V1200M1620 0V1200"/>
  </g>

  <g transform="translate(120 115)" filter="url(#softShadow)">
    <rect width="170" height="170" rx="43" fill="url(#iconSurface)"/>
    <rect x="4" y="4" width="162" height="162" rx="40" fill="none" stroke="#ffffff" stroke-opacity=".16" stroke-width="3"/>
    <path d="M85 25c8.4 55 31.2 77.8 86 85-54.8 7.2-77.6 30-86 85-8.4-55-31.2-77.8-86-85 54.8-7.2 77.6-30 86-85Z" transform="translate(0 -25) scale(.82) translate(20 23)" fill="url(#spark)"/>
    <circle cx="125" cy="46" r="10" fill="#e7e1f7"/>
  </g>

  <g transform="translate(120 450)">
    <text x="0" y="0" fill="#ffffff" font-family="Georgia, 'Times New Roman', serif" font-size="164" font-weight="700" letter-spacing="-7">Codex</text>
    <text x="0" y="174" fill="#ffffff" font-family="Georgia, 'Times New Roman', serif" font-size="164" font-weight="700" letter-spacing="-8">Design Studio</text>
    <rect x="4" y="242" width="112" height="7" rx="3.5" fill="#d8d0ec"/>
    <text x="0" y="331" fill="#f0edf7" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="400">Create, build, and edit your design assets and system with AI.</text>
  </g>

  <g transform="translate(1540 550)" filter="url(#softShadow)">
    <rect x="-240" y="-240" width="480" height="480" rx="120" fill="#1c1924" fill-opacity=".74" stroke="#ffffff" stroke-opacity=".14" stroke-width="3"/>
    <rect x="-214" y="-214" width="428" height="428" rx="107" fill="url(#iconSurface)"/>
    <rect x="-205" y="-205" width="410" height="410" rx="102" fill="none" stroke="#ffffff" stroke-opacity=".15" stroke-width="5"/>
    <path d="M0-137C15 1 79 65 217 80 79 95 15 159 0 297-15 159-79 95-217 80-79 65-15 1 0-137Z" transform="translate(0 -80) scale(.9)" fill="url(#spark)"/>
    <circle cx="150" cy="-135" r="28" fill="#e7e1f7"/>
  </g>
</svg>
