name: Native desktop release

on:
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/release.yml"
      - "desktop/**"
      - "scripts/prepare-standalone.mjs"
      - "scripts/test-packaged-electron.mjs"
      - "scripts/verify-packaged-runtime.mjs"
      - "forge.config.cjs"
      - "next.config.ts"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional tag for a draft GitHub Release, for example v0.1.0-rc.1
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Intel
            runner: macos-15-intel
            platform: darwin
            arch: x64
          - label: macOS Apple Silicon
            runner: macos-15
            platform: darwin
            arch: arm64
          - label: Windows x64
            runner: windows-2025
            platform: win32
            arch: x64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    env:
      # Keep one native browser installation discoverable by source tests,
      # the desktop runtime packager, and packaged-runtime verification.
      PLAYWRIGHT_BROWSERS_PATH: "0"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install native Chromium runtime
        run: npx playwright install chromium

      - name: Verify source contracts
        run: npm run typecheck && npm test

      - name: Build native desktop media
        run: npm run desktop:make -- --arch=${{ matrix.arch }}

      - name: Verify packaged Codex and Chromium
        run: npm run test:runtime:packaged

      - name: Verify packaged Electron lifecycle
        run: npm run test:electron:packaged

      - name: Upload native release media
        uses: actions/upload-artifact@v7
        with:
          name: codex-design-studio-${{ matrix.platform }}-${{ matrix.arch }}
          path: out/make/**
          if-no-files-found: error
          retention-days: 7

  draft-release:
    name: Assemble draft GitHub Release
    needs: package
    if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.release_tag != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Download native media
        uses: actions/download-artifact@v8
        with:
          pattern: codex-design-studio-*
          path: release-assets
          merge-multiple: true

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          tag="$INPUT_TAG"
          if [ -z "$tag" ]; then tag="${GITHUB_REF_NAME}"; fi
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release-assets/* --clobber
          else
            gh release create "$tag" release-assets/* --draft --generate-notes --target "$GITHUB_SHA" --title "Codex Design Studio $tag"
          fi
